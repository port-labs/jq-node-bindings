name: Publish @port-labs/jq-node-bindings

on:
  release:
    types: [created]

permissions:
  id-token: write
  contents: read

env:
  NPM_REGISTRY_URL: https://registry.npmjs.org
jobs:
  publish-npm:
    runs-on: ubuntu-latest
    steps:
      - name: Install node-gyp deps
        run: sudo apt-get install -y autoconf make libtool automake build-essential
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: actions/setup-node@v6
        with:
          node-version: 22.x
          registry-url: ${{ env.NPM_REGISTRY_URL }}
      - name: Upgrade npm for OIDC support
        run: |
          corepack prepare npm@latest --activate
          corepack enable
          npm --version
      - run: npm ci
      - name: Configure npm for OIDC
        run: echo "registry=https://registry.npmjs.org/" > "$NPM_CONFIG_USERCONFIG"
      - run: npm publish --provenance --tag=next --access public
        if: ${{ github.event.release.prerelease }}
      - run: npm publish --provenance --access public
        if: ${{ !github.event.release.prerelease }}